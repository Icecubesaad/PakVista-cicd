# ============================================================
# cd-dev.yml – CD Pipeline for Development Environment
# Trigger: Push to 'develop' branch
# Author: Zaid (Member 2)
# ============================================================

name: CD – Development

on:
  push:
    branches:
      - develop

jobs:
  deploy-development:
    name: Deploy to Render – Development
    runs-on: ubuntu-latest
    environment: development

    steps:
      # Step 1 – Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 – Environment is declared above (environment: development)
      # This injects RENDER_DEPLOY_HOOK_DEV_URL into the job automatically

      # Step 3 – Trigger Render deployment via deploy hook
      - name: Trigger Render Deploy (Development)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DEV_URL }}"

      # Step 4 – Output confirmation with timestamp
      - name: Confirm Deployment
        run: |
          echo "Deployment to development environment triggered at $(date)"