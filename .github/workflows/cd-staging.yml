# ============================================================
# cd-staging.yml – CD Pipeline for Staging Environment
# Trigger: Push to 'staging' branch
# Author: Aoun (Member 4)
# ============================================================

name: CD – Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy-staging:
    name: Deploy to Render – Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      # Step 1 – Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 – Environment declared above (environment: staging)
      # Injects RENDER_DEPLOY_HOOK_STAGING_URL into the job

      # Step 3 – Trigger Render deployment via deploy hook
      - name: Trigger Render Deploy (Staging)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING_URL }}"

      # Step 4 – Output confirmation with timestamp
      - name: Confirm Deployment
        run: |
          echo "Deployment to staging environment triggered at $(date)"