# ============================================================
# cd-prod.yml – CD Pipeline for Production Environment
# Trigger: Push to 'main' branch
# Author: Saad (Team Lead)
# ============================================================

name: CD – Production

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    name: Deploy to Render – Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      # Step 1 – Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 – Environment declared above (environment: production)
      # Injects RENDER_DEPLOY_HOOK_PROD_URL into the job

      # Step 3 – Trigger Render deployment via deploy hook
      - name: Trigger Render Deploy (Production)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD_URL }}"

      # Step 4 – Output confirmation with timestamp
      - name: Confirm Deployment
        run: |
          echo "Deployment to production environment triggered at $(date)"